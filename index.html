<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>記帳助手</title>
  <style>
    body { margin: 0; background: #F8F5F0; }
    #pre-loader {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #F8F5F0;
    }
    #pre-loader .pl-blob-1 {
      position: absolute; top: -10%; left: -10%; width: 50%; height: 40%;
      background: rgba(241,250,238,0.4); border-radius: 50%; filter: blur(80px);
    }
    #pre-loader .pl-blob-2 {
      position: absolute; bottom: -10%; right: -10%; width: 50%; height: 40%;
      background: rgba(253,236,234,0.35); border-radius: 50%; filter: blur(80px);
    }
    #pre-loader .pl-blob-3 {
      position: absolute; top: 40%; left: 20%; width: 60%; height: 30%;
      background: rgba(254,249,231,0.3); border-radius: 50%; filter: blur(100px);
    }
    #pre-loader .pl-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
    #pre-loader .pl-icon-box {
      width: 5rem; height: 5rem; border-radius: 1rem;
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(24px);
      box-shadow: 0 10px 15px -3px rgba(231, 229, 228, 0.5), 0 4px 6px -4px rgba(231, 229, 228, 0.5);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2rem; animation: pl-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    #pre-loader .pl-icon-box svg { width: 2.5rem; height: 2.5rem; color: #57534e; }
    #pre-loader .pl-title {
      font-size: 1.25rem; font-weight: 700; color: #44403c;
      margin-bottom: 1.5rem; letter-spacing: -0.025em; font-family: ui-monospace, monospace;
    }
    #pre-loader .pl-bar-track {
      width: 12rem; height: 0.375rem; background-color: rgba(231, 229, 228, 0.6);
      border-radius: 9999px; overflow: hidden; backdrop-filter: blur(4px);
    }
    #pre-loader .pl-bar-fill {
      height: 100%; width: 0%; border-radius: 9999px;
      background: linear-gradient(to right, #a8a29e, #57534e);
      animation: pl-bar-grow 2s ease-out forwards;
    }
    #pre-loader .pl-text {
      font-size: 0.75rem; color: #a8a29e; margin-top: 0.75rem;
      font-family: ui-monospace, monospace;
    }
    @keyframes pl-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes pl-bar-grow {
      0% { width: 0%; }
      100% { width: 15%; }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="pre-loader">
      <div class="pl-blob-1"></div>
      <div class="pl-blob-2"></div>
      <div class="pl-blob-3"></div>
      <div class="pl-content">
        <div class="pl-icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>
        </div>
        <h1 class="pl-title">記帳助手</h1>
        <div class="pl-bar-track">
          <div class="pl-bar-fill"></div>
        </div>
        <p class="pl-text">載入資料中...</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
